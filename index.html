<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>С 8 Марта ❤️</title>

<style>
body{
  margin:0;
  height:100vh;
  background:linear-gradient(135deg,#ff9a9e,#fecfef);
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:Arial, sans-serif;
}

.scene{
  position:relative;
  width:320px;
  height:220px;
  text-align:center;
}

.envelope{
  position:absolute;
  width:100%;
  height:100%;
  background:#fff;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 15px 40px rgba(0,0,0,0.2);
  animation:shake 1.5s infinite;
}

@keyframes shake{
  0%,100%{transform:rotate(0)}
  25%{transform:rotate(2deg)}
  75%{transform:rotate(-2deg)}
}

.flap{
  position:absolute;
  top:0;
  width:100%;
  height:100%;
  background:#ff4d6d;
  clip-path:polygon(0 0,50% 55%,100% 0);
  transform-origin:top;
  transition:transform 1s ease;
  border-radius:12px 12px 0 0;
}

.open .flap{
  transform:rotateX(180deg);
}

.message{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:22px;
  font-weight:bold;
  color:#ff4d6d;
  opacity:0;
  transition:opacity 1s ease 0.5s;
}

.open .message{
  opacity:1;
}

.photos{
  position:absolute;
  top:-50px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  opacity:0;
  transition:all 1.2s ease;
}

.photos img{
  width:75px;
  height:95px;
  object-fit:cover;
  border-radius:12px;
  box-shadow:0 10px 20px rgba(0,0,0,0.25);
  transform:translateY(80px) rotate(0deg);
  transition:all 1.2s ease;
}

.open .photos{
  opacity:1;
  transform:translate(-50%,-160px);
}

.open .photos img:nth-child(1){ transform:rotate(-25deg);}
.open .photos img:nth-child(2){ transform:rotate(-15deg);}
.open .photos img:nth-child(3){ transform:rotate(-5deg);}
.open .photos img:nth-child(4){ transform:rotate(0deg);}
.open .photos img:nth-child(5){ transform:rotate(5deg);}
.open .photos img:nth-child(6){ transform:rotate(15deg);}
.open .photos img:nth-child(7){ transform:rotate(25deg);}
.open .photos img:nth-child(8){ transform:rotate(35deg);}

.heart{
  position:fixed;
  top:-20px;
  font-size:22px;
  animation:fall linear forwards;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10px) rotate(0deg); opacity:1;}
  100%{transform:translateY(110vh) rotate(360deg); opacity:0.9;}
}
</style>
</head>

<body>

<!-- 🎵 УКАЖИ ЗДЕСЬ ПУТЬ К СВОЕЙ МУЗЫКЕ -->
<audio id="bgMusic" src="music.mp3" loop></audio>

<div class="scene">
  <div class="envelope" id="envelope">
      <div class="flap"></div>
      <div class="message">С 8 Марта, любимая! ❤️</div>
  </div>

  <div class="photos">
      <img src="photo1.jpg">
      <img src="photo2.jpg">
      <img src="photo3.jpg">
      <img src="photo4.jpg">
      <img src="photo5.jpg">
      <img src="photo6.jpg">
      <img src="photo7.jpg">
      <img src="photo8.jpg">
  </div>
</div>

<script>
const envelope = document.getElementById("envelope");
const music = document.getElementById("bgMusic");

let confettiStarted = false;

envelope.addEventListener("click",()=>{

  if(!envelope.classList.contains("open")){
    envelope.classList.add("open");

    // 🎵 Запуск музыки
    music.play().catch(()=>{});

    // ❤️ Запуск бесконечных конфетти
    if(!confettiStarted){
      setInterval(createHeart,150);
      confettiStarted = true;
    }
  }
});

function createHeart(){
  const heart = document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.animationDuration=(Math.random()*3+3)+"s";
  heart.style.fontSize=(Math.random()*15+15)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),6000);
}
</script>

</body>
</html>
