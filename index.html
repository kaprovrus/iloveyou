<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>✨ Волшебная открытка ✨</title>
<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  margin:0; padding:0;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  height: 100vh; overflow: hidden;
  position: fixed; width:100%;
}

/* Анимированные частицы фона */
.particle {
  position: absolute;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  pointer-events: none;
  z-index: 1;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.1); }
}

/* Конверт */
.envelope {
  width: min(220px, 65vw);
  height: min(160px, 45vw);
  background: url('envelope.png') no-repeat center center;
  background-size: contain;
  position: absolute;
  top:50%; left:50%;
  transform: translate(-50%,-50%);
  cursor:pointer;
  z-index: 5;
  animation: floatEnvelope 4s ease-in-out infinite;
  filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
  transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes floatEnvelope {
  0%, 100% { transform: translate(-50%,-50%) translateY(0); }
  50% { transform: translate(-50%,-50%) translateY(-15px); }
}

/* Фото в полете - УМЕНЬШИЛ ДЛЯ МОБИЛЬНЫХ */
.photo {
  position: absolute; 
  width: min(90px, 22vw); /* Было 120px, стало 90px */
  height: min(110px, 28vw); /* Было 150px, стало 110px */
  background-size: cover; 
  background-position: center;
  border: 3px solid white; /* Уменьшил рамку */
  border-radius: 12px;
  box-shadow: 0 10px 20px rgba(0,0,0,0.3);
  opacity:0; 
  transform: scale(0.5) rotate(-10deg);
  z-index: 30;
  transition: all 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
  will-change: transform,opacity;
  cursor: pointer;
  overflow: hidden;
}

.photo::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(45deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
  pointer-events: none;
}

/* В финале фото с прозрачностью 0.25 */
.final-overlay.show ~ .photo {
  z-index: 45 !important;
  opacity: 0.25 !important;
  filter: brightness(1);
  transition: all 1.5s ease;
}

/* Сердечки - поменьше для мобильных */
.heart {
  position:absolute;
  width:min(20px, 5vw); 
  height:min(20px, 5vw);
  background: url('heart.png') no-repeat center center;
  background-size: contain;
  opacity:0; 
  z-index: 20; 
  pointer-events:none;
  filter: drop-shadow(0 0 8px rgba(255,107,107,0.5));
}

/* Сообщение - адаптивное */
.message {
  position:absolute; 
  top:50%; left:50%;
  transform: translate(-50%,-50%);
  background: rgba(255,255,255,0.98);
  backdrop-filter: blur(10px);
  padding: clamp(15px, 4vw, 25px);
  border-radius:25px; 
  box-shadow:0 15px 30px rgba(0,0,0,0.2);
  opacity:0; 
  width:min(400px, 85%); 
  max-width:85%;
  text-align:center; 
  font-size:clamp(14px, 4vw, 18px);
  line-height:1.5; 
  transition: opacity 1.5s ease;
  z-index: 15;
  pointer-events:none;
  max-height:80vh; 
  overflow-y:auto; 
  -webkit-overflow-scrolling: touch;
  border: 2px solid rgba(255,107,107,0.3);
}

.message.show { 
  opacity:1; 
  pointer-events:auto;
  animation: messageAppear 1.5s ease;
}

@keyframes messageAppear {
  0% { transform: translate(-50%,-30%) scale(0.8); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
}

.message h2 { 
  font-size: clamp(20px, 6vw, 28px); 
  color:#ff6b6b; 
  margin:0 0 10px 0;
  text-shadow: 2px 2px 4px rgba(255,107,107,0.2);
}

.message p {
  margin:8px 0;
}

.message p:last-child {
  font-size:1.2em;
  animation: pulse 3s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ФИНАЛЬНЫЙ ОВЕРЛЕЙ - АДАПТИВНЫЙ */
.final-overlay {
  position: fixed; 
  top:50%; left:50%;
  transform: translate(-50%,-50%);
  background: rgba(255, 245, 245, 0.9);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  border-radius:30px;
  box-shadow:0 15px 30px rgba(255,107,107,0.2);
  z-index: 25;
  display:flex; 
  flex-direction:column;
  justify-content:center; 
  align-items:center;
  opacity:0; 
  pointer-events:none;
  padding:20px 15px;
  max-width:85%; 
  width:350px;
  border: 2px solid rgba(255,255,255,0.5);
}

.final-overlay.show { 
  opacity:1; 
  pointer-events:auto;
  animation: overlayAppear 2s ease;
}

@keyframes overlayAppear {
  0% { transform: translate(-50%,-30%) scale(0.8); opacity: 0; }
  100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
}

.final-overlay h1 {
  font-size: clamp(20px, 5vw, 24px);
  color:#ff4d4d; 
  text-align:center;
  animation: zoomIn 2s ease;
  margin:0 0 8px 0; 
  line-height:1.3; 
  text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
  font-weight:700;
}

.final-overlay p {
  font-size: clamp(14px, 4vw, 18px);
  color:#333;
  text-align:center;
  line-height:1.3;
  margin:4px 0;
  animation: fadeIn 2.5s ease;
  font-weight:500;
  text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
}

.final-overlay .heart-big {
  font-size: 35px;
  animation: heartbeat 2s ease-in-out infinite;
  margin: 5px 0 8px 0;
  filter: drop-shadow(0 0 8px rgba(255,77,77,0.5));
}

@keyframes heartbeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

@keyframes zoomIn { 
  0%{transform:scale(0.5);opacity:0;}
  100%{transform:scale(1);opacity:1;} 
}

@keyframes fadeIn {
  0% { opacity: 0; }
  100% { opacity: 0.35; }
}

@keyframes fly { 
  0%{transform:translate(-50%,-50%) scale(0.5) rotate(-20deg);opacity:0;}
  100%{transform:translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1) rotate(0deg);opacity:0.35;} 
}

@keyframes heart-fall {
  0%{transform:translateY(-20vh) rotate(0deg) scale(1);opacity:0.8;}
  100%{transform:translateY(100vh) rotate(720deg) scale(0);opacity:0;}
}

/* Увеличенное фото */
.photo-enlarged {
  position:fixed; 
  max-width:90%; 
  max-height:80vh;
  top:50%; left:50%; 
  transform:translate(-50%,-50%) scale(0.9);
  z-index: 100;
  border:4px solid white; 
  border-radius:15px;
  box-shadow:0 20px 40px rgba(0,0,0,0.5);
  opacity:0; 
  transition:all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  object-fit:contain;
  cursor: pointer;
}

.photo-enlarged.show{ 
  opacity:1; 
  transform:translate(-50%,-50%) scale(1);
}

.photo-enlarged-backdrop { 
  position:fixed; 
  top:0; left:0; 
  width:100%; 
  height:100%; 
  background:rgba(0,0,0,0.85);
  backdrop-filter: blur(5px);
  z-index: 90; 
  opacity:0; 
  transition:opacity 0.5s ease; 
  pointer-events:none;
}

.photo-enlarged-backdrop.show{ 
  opacity:1; 
  pointer-events:auto; 
}

/* Музыкальный контроллер - компактный */
.music-control { 
  position:fixed; 
  bottom:15px; 
  right:15px;
  background:linear-gradient(135deg, #ff6b6b, #ee5253); 
  color:white;
  padding:10px 18px; 
  border-radius:40px; 
  cursor:pointer;
  font-size:14px; 
  font-weight:600; 
  box-shadow:0 5px 15px rgba(255,107,107,0.4);
  z-index: 50; 
  display:none; 
  border:none; 
  backdrop-filter:blur(10px); 
  -webkit-backdrop-filter:blur(10px);
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}

.music-control.show{ 
  display:block;
  animation: slideIn 1s ease;
}

@keyframes slideIn {
  from { transform: translateX(100px); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

/* Счетчик фото */
.photo-count {
  position: fixed;
  top: 15px;
  right: 15px;
  background: rgba(255,255,255,0.9);
  padding: 8px 15px;
  border-radius: 25px;
  color: #ff6b6b;
  font-weight: bold;
  font-size: 14px;
  z-index: 60; 
  display: none;
  backdrop-filter: blur(5px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.photo-count.show {
  display: block;
  animation: slideIn 1s ease;
}

/* Для очень маленьких экранов */
@media (max-width: 380px) {
  .photo {
    width: 75px;
    height: 95px;
    border-width: 2px;
  }
  
  .final-overlay {
    padding: 15px 10px;
    width: 300px;
  }
  
  .final-overlay h1 {
    font-size: 18px;
  }
  
  .final-overlay p {
    font-size: 13px;
  }
  
  .final-overlay .heart-big {
    font-size: 30px;
  }
  
  .message {
    padding: 12px;
    font-size: 13px;
  }
  
  .message h2 {
    font-size: 18px;
  }
}
</style>
</head>
<body>

<div class="envelope" id="envelope"></div>
<div class="photo-count" id="photoCount">📸 0/8</div>
<div id="photosContainer"></div>
<div id="effectsContainer"></div>

<div class="message" id="message">
  <h2>💝 Моя любимая! 💝</h2>
  <p>Хочу, чтобы каждый твой день был наполнен радостью, теплом и улыбками. Ты делаешь мою жизнь ярче, а каждый момент рядом с тобой — особенным.</p>
  <p>✨ Я ценю и люблю тебя ✨</p>
  <p style="margin-bottom:0;">❤️ С праздником! ❤️</p>
</div>

<!-- ФИНАЛЬНЫЙ ОВЕРЛЕЙ -->
<div class="final-overlay" id="finalOverlay">
  <h1>💖 С любовью!</h1>
  <div class="heart-big">❤️</div>
  <p>Ты самое дорогое</p>
  <p>Спасибо за счастье</p>
  <p>✨ С праздником! ✨</p>
</div>

<div id="enlargedPhotoContainer"></div>
<div id="enlargedBackdrop" class="photo-enlarged-backdrop"></div>

<button class="music-control" id="musicControl">🎵 Выключить музыку</button>
<audio id="bgMusic" loop preload="auto">
  <source src="music.mp3" type="audio/mp3">
</audio>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const envelope = document.getElementById('envelope');
  const photosContainer = document.getElementById('photosContainer');
  const effectsContainer = document.getElementById('effectsContainer');
  const message = document.getElementById('message');
  const music = document.getElementById('bgMusic');
  const musicControl = document.getElementById('musicControl');
  const finalOverlay = document.getElementById('finalOverlay');
  const enlargedPhotoContainer = document.getElementById('enlargedPhotoContainer');
  const enlargedBackdrop = document.getElementById('enlargedBackdrop');
  const photoCount = 8;
  const allPhotos = [];

  // Создание фоновых частиц
  function createParticles() {
    for (let i = 0; i < 15; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.width = `${Math.random() * 8 + 3}px`;
      particle.style.height = particle.style.width;
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.top = `${Math.random() * 100}%`;
      particle.style.animationDelay = `${Math.random() * 3}s`;
      particle.style.background = `rgba(255, 255, 255, ${Math.random() * 0.3})`;
      document.body.appendChild(particle);
    }
  }
  createParticles();

  function preventBodyScroll(prevent){ 
    document.body.style.overflow = prevent ? 'hidden':''; 
  }

  envelope.addEventListener('click', function(e){
    e.stopPropagation();
    music.volume = 0.5;
    music.play().catch(() => {
      console.log('Music autoplay failed');
    });
    
    envelope.style.opacity = '0';
    envelope.style.pointerEvents = 'none';
    message.classList.add('show');
    musicControl.classList.add('show');
    photosContainer.innerHTML = ''; 
    allPhotos.length = 0;

    const photoCounter = document.getElementById('photoCount');
    photoCounter.classList.add('show');
    updatePhotoCounter();

    let delay = 0;
    // Уменьшил расстояние для мобильных
    const distance = Math.min(180, window.innerWidth * 0.25);
    
    for(let i = 1; i <= photoCount; i++){
      const photo = document.createElement('div');
      photo.className = 'photo';
      photo.style.backgroundImage = `url('photo${i}.jpg')`;
      photo.dataset.src = `photo${i}.jpg`;
      const angle = (i-1) * (2 * Math.PI / photoCount);
      photo.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
      photo.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
      photo.style.left = '50%'; 
      photo.style.top = '50%';
      
      photo.addEventListener('click', (e) => {
        e.stopPropagation();
        showEnlargedPhoto(photo.dataset.src);
      });
      
      photosContainer.appendChild(photo);
      allPhotos.push(photo);
      
      setTimeout(() => { 
        photo.style.opacity = '1'; 
        photo.style.animation = 'fly 2s ease-out forwards';
      }, delay);
      
      delay += 300; // Немного быстрее для мобильных
    }

    setTimeout(() => createHearts(30), 1500);
    setTimeout(() => prepareFinalView(), delay + 2500);
  });

  function updatePhotoCounter() {
    const counter = document.getElementById('photoCount');
    const visiblePhotos = Array.from(allPhotos).filter(p => p.style.opacity === '1').length;
    counter.textContent = `📸 ${visiblePhotos}/${photoCount}`;
    
    if (visiblePhotos < photoCount) {
      setTimeout(updatePhotoCounter, 200);
    }
  }

  function prepareFinalView(){
    message.classList.remove('show');
    finalOverlay.classList.add('show');
    document.getElementById('photoCount').classList.remove('show');
    createHearts(40);
  }

  function showEnlargedPhoto(src){
    enlargedPhotoContainer.innerHTML = '';
    enlargedBackdrop.classList.add('show');
    
    const enlargedPhoto = document.createElement('img');
    enlargedPhoto.className = 'photo-enlarged';
    enlargedPhoto.src = src;
    enlargedPhoto.alt = 'Увеличенное фото';
    
    enlargedPhotoContainer.appendChild(enlargedPhoto);
    
    setTimeout(() => { 
      enlargedPhoto.classList.add('show'); 
    }, 50);
    
    preventBodyScroll(true);

    function closeEnlarged(){
      enlargedPhoto.classList.remove('show');
      enlargedBackdrop.classList.remove('show');
      preventBodyScroll(false);
      setTimeout(() => { 
        enlargedPhoto.remove(); 
      }, 600);
    }

    enlargedPhoto.addEventListener('click', closeEnlarged);
    enlargedBackdrop.addEventListener('click', closeEnlarged);

    let touchStartY = 0;
    enlargedPhoto.addEventListener('touchstart', (e) => { 
      touchStartY = e.touches[0].clientY; 
    }, {passive: true});
    
    enlargedPhoto.addEventListener('touchend', (e) => {
      const touchEndY = e.changedTouches[0].clientY;
      if(Math.abs(touchEndY - touchStartY) > 50) {
        closeEnlarged();
      }
    });
  }

  function createHearts(count){
    for(let i = 0; i < count; i++){
      setTimeout(() => {
        const heart = document.createElement('div');
        heart.className = 'heart';
        heart.style.left = `${Math.random() * 100}%`;
        heart.style.top = '-10%';
        heart.style.animation = `heart-fall ${3 + Math.random() * 4}s linear forwards`;
        heart.style.opacity = '0.8';
        heart.style.transform = `scale(${0.5 + Math.random() * 1.2})`;
        effectsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 7000);
      }, i * 120);
    }
  }

  musicControl.addEventListener('click', function(){
    if(music.paused){ 
      music.play().catch(() => {}); 
      musicControl.innerHTML = '🎵 Выключить музыку'; 
    } else { 
      music.pause(); 
      musicControl.innerHTML = '🎵 Включить музыку'; 
    }
  });

  document.body.addEventListener('touchmove', (e) => {
    if(enlargedBackdrop.classList.contains('show')) {
      e.preventDefault();
    }
  }, {passive: false});

  window.addEventListener('load', () => {
    createHearts(10);
  });
});
</script>
</body>
</html>
